name: Deploy KingHost Node

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-kinghost-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KINGHOST_SSH_HOST: ${{ secrets.KINGHOST_SSH_HOST }}
      KINGHOST_APP_RESTART_CMD: ${{ secrets.KINGHOST_APP_RESTART_CMD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build (bundle com esbuild)
        run: npm run build

      - name: Prepare deploy package
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp dist/server.js deploy/server.js
          cp package.json deploy/package.json

      - name: Gerar .env de produção
        run: |
          cat > deploy/.env <<EOF
          NODE_ENV=production
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_SSL=${{ secrets.DB_SSL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          EOF
          sed -i 's/^[[:space:]]*//' deploy/.env

      - name: Upload files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.KINGHOST_FTP_HOST }}
          username: ${{ secrets.KINGHOST_FTP_USER }}
          password: ${{ secrets.KINGHOST_FTP_PASSWORD }}
          protocol: ftp
          port: ${{ secrets.KINGHOST_FTP_PORT || 21 }}
          local-dir: ./deploy/
          server-dir: ${{ secrets.KINGHOST_REMOTE_DIR }}

      - name: Restart Node app over SSH
        if: ${{ env.KINGHOST_SSH_HOST != '' && env.KINGHOST_APP_RESTART_CMD != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.KINGHOST_SSH_HOST }}
          username: ${{ secrets.KINGHOST_SSH_USER }}
          key: ${{ secrets.KINGHOST_SSH_PRIVATE_KEY }}
          port: ${{ secrets.KINGHOST_SSH_PORT }}
          script: ${{ secrets.KINGHOST_APP_RESTART_CMD }}
