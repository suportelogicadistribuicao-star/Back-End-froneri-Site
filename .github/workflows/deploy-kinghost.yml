name: Deploy KingHost Node

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-kinghost-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KINGHOST_SSH_HOST: ${{ secrets.KINGHOST_SSH_HOST }}
      KINGHOST_APP_RESTART_CMD: ${{ secrets.KINGHOST_APP_RESTART_CMD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare deploy package
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp package.json deploy/
          cp package-lock.json deploy/
          cp -r dist deploy/

      - name: Upload files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.KINGHOST_FTP_HOST }}
          username: ${{ secrets.KINGHOST_FTP_USER }}
          password: ${{ secrets.KINGHOST_FTP_PASSWORD }}
          protocol: ftp
          port: ${{ secrets.KINGHOST_FTP_PORT || 21 }}
          local-dir: ./deploy/
          server-dir: ${{ secrets.KINGHOST_REMOTE_DIR }}

      - name: Install production dependencies over SSH
        if: ${{ env.KINGHOST_SSH_HOST != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.KINGHOST_SSH_HOST }}
          username: ${{ secrets.KINGHOST_SSH_USER }}
          key: ${{ secrets.KINGHOST_SSH_PRIVATE_KEY }}
          port: ${{ secrets.KINGHOST_SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.KINGHOST_REMOTE_DIR }}
            npm install --omit=dev

      - name: Restart Node app over SSH
        if: ${{ env.KINGHOST_SSH_HOST != '' && env.KINGHOST_APP_RESTART_CMD != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.KINGHOST_SSH_HOST }}
          username: ${{ secrets.KINGHOST_SSH_USER }}
          key: ${{ secrets.KINGHOST_SSH_PRIVATE_KEY }}
          port: ${{ secrets.KINGHOST_SSH_PORT }}
          script: ${{ secrets.KINGHOST_APP_RESTART_CMD }}
