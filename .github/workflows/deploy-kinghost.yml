name: Deploy KingHost Node

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-kinghost-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_NODE_VERSION: 24
      KINGHOST_SSH_HOST: ${{ secrets.KINGHOST_SSH_HOST }}
      KINGHOST_APP_RESTART_CMD: ${{ secrets.KINGHOST_APP_RESTART_CMD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.APP_NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript → JavaScript, estrutura preservada)
        run: npm run build

      - name: Prepare deploy package
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -r dist/. deploy/
          cp package.json deploy/package.json
          cp package-lock.json deploy/package-lock.json

      - name: Gerar .env de produção
        run: |
          cat > deploy/.env <<EOF
          NODE_ENV=production
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_SSL=${{ secrets.DB_SSL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          EOF
          sed -i 's/^[[:space:]]*//' deploy/.env

      - name: Normalizar diretório remoto
        id: remote_dir
        run: |
          DIR="${{ secrets.KINGHOST_REMOTE_DIR }}"
          DIR="${DIR%/}/"
          echo "value=$DIR" >> "$GITHUB_OUTPUT"

      - name: Upload files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.KINGHOST_FTP_HOST }}
          username: ${{ secrets.KINGHOST_FTP_USER }}
          password: ${{ secrets.KINGHOST_FTP_PASSWORD }}
          protocol: ftp
          port: ${{ secrets.KINGHOST_FTP_PORT || 21 }}
          local-dir: ./deploy/
          server-dir: ${{ steps.remote_dir.outputs.value }}
          dangerous-clean-slate: true
          exclude: |
            **/node_modules/**
            **/node_modules/

      - name: Instalar dependências de produção no servidor
        if: ${{ env.KINGHOST_SSH_HOST != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.KINGHOST_SSH_HOST }}
          username: ${{ secrets.KINGHOST_SSH_USER }}
          password: ${{ secrets.KINGHOST_SSH_PASSWORD }}
          port: ${{ secrets.KINGHOST_SSH_PORT }}
          script: |
            cd ${{ steps.remote_dir.outputs.value }}
            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              export NVM_DIR="$HOME/.nvm"
              . "$NVM_DIR/nvm.sh"
              nvm use ${{ env.APP_NODE_VERSION }} || nvm use 20
            fi
            npm ci --omit=dev || npm install --omit=dev

      - name: Restart Node app over SSH
        if: ${{ env.KINGHOST_SSH_HOST != '' && env.KINGHOST_APP_RESTART_CMD != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.KINGHOST_SSH_HOST }}
          username: ${{ secrets.KINGHOST_SSH_USER }}
          password: ${{ secrets.KINGHOST_SSH_PASSWORD }}
          port: ${{ secrets.KINGHOST_SSH_PORT }}
          script: ${{ secrets.KINGHOST_APP_RESTART_CMD }}
