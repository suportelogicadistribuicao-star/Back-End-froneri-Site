name: Deploy KingHost Node

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-kinghost-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_NODE_VERSION: 24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.APP_NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript → JavaScript, estrutura preservada)
        run: npm run build

      - name: Prepare deploy package
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -r dist/. deploy/
          cp package.json deploy/package.json
          cp package-lock.json deploy/package-lock.json

      - name: Gerar .env de produção
        run: |
          cat > deploy/.env <<EOF
          NODE_ENV=production
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_SSL=${{ secrets.DB_SSL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          EOF
          sed -i 's/^[[:space:]]*//' deploy/.env

      - name: Normalizar diretório remoto
        id: remote_dir
        run: |
          DIR="${{ secrets.KINGHOST_REMOTE_DIR }}"
          DIR="${DIR%/}/"
          echo "value=$DIR" >> "$GITHUB_OUTPUT"

      - name: Upload files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.KINGHOST_FTP_HOST }}
          username: ${{ secrets.KINGHOST_FTP_USER }}
          password: ${{ secrets.KINGHOST_FTP_PASSWORD }}
          protocol: ftp
          port: ${{ secrets.KINGHOST_FTP_PORT || 21 }}
          local-dir: ./deploy/
          server-dir: ${{ steps.remote_dir.outputs.value }}
          exclude: |
            **/node_modules/**
            **/node_modules/
            **/.deploy-deps-hash

      # O restart automático via SSH foi removido: o firewall da KingHost
      # bloqueia conexões dos runners do GitHub Actions (IP dinâmico).
      # Após o deploy, reinicie manualmente pelo Painel de Controle
      # KingHost → Node.js → Restart.
